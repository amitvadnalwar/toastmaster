name: Deploy PWA to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'web/**'
      - 'guest-web/**'
      - '.github/workflows/deploy-web.yml'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        working-directory: web
        run: npm ci --legacy-peer-deps

      - name: Build PWA
        working-directory: web
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}
          VITE_BASE_PATH: /toastmaster/app/

      - name: Build root landing page
        run: |
          mkdir -p _site_root
          cat > _site_root/index.html <<'EOF'
          <!DOCTYPE html>
          <html lang="en">
            <head>
              <meta charset="UTF-8" />
              <meta name="viewport" content="width=device-width, initial-scale=1.0" />
              <title>Toastmaster Pune South East</title>
              <style>
                body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background:#f5f5f5; margin:0; padding:48px 20px; text-align:center; color:#111827; }
                h1 { color:#8B1A1A; }
                a { display:inline-block; margin:12px; padding:14px 28px; background:#8B1A1A; color:#fff; text-decoration:none; border-radius:10px; font-weight:600; }
              </style>
            </head>
            <body>
              <h1>Toastmaster Pune South East</h1>
              <a href="/toastmaster/app/">Open Club App</a>
              <a href="/toastmaster/guest-web/">Guest Feedback</a>
            </body>
          </html>
          EOF

      - name: Deploy app to gh-pages (/app)
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: web/dist
          destination_dir: app
          keep_files: true

      - name: Deploy guest-web to gh-pages (/guest-web)
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: guest-web
          destination_dir: guest-web
          keep_files: true

      - name: Deploy landing page to gh-pages (/)
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: _site_root
          destination_dir: .
          keep_files: true
